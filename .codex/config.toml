# Codex configuration
# Documentation: https://github.com/openai/codex

[core]
# Default mode: conservative changes
default_mode = "conservative"

# Agent instructions (read on startup)
instructions = "AGENTS.md"

# Working directory
# working_dir = "."

[model]
# Default model (cloud)
default = "o4-mini"

# Model for review
review_model = "gpt-4.1"

# Reasoning effort: low | medium | high | max
reasoning_effort = "medium"

# --- Profiles (switch via: codex --profile <name>) ---

[profiles.cloud-high]
model = "o3"
reasoning_effort = "high"
description = "P0 tasks: security, architecture, critical bugs"

[profiles.cloud-medium]
model = "o4-mini"
reasoning_effort = "medium"
description = "P1 tasks: features, refactors, integrations"

[profiles.local-fast]
model = "Qwen2.5-Coder-7B-Instruct-exl2"
reasoning_effort = "low"
description = "P2 tasks: boilerplate, docs, simple tests"

[profiles.local-fast.model_provider]
name = "local"
base_url = "http://localhost:33931/v1"
# No authentication — local server
# env_key = ""

[profiles.local-cheap]
model = "Qwen2.5-14B-Instruct-exl2"
reasoning_effort = "low"
description = "P3 tasks: triage, search, changelogs"

[profiles.local-cheap.model_provider]
name = "local"
base_url = "http://localhost:33931/v1"

# --- Sandbox / safety ---
[sandbox]
# Commands that Codex can execute without approval
allowed_commands = [
  "npm test",
  "npm run lint",
  "npm run typecheck",
  "npm run build",
  "python -m pytest",
  "python -m mypy",
  "go test ./...",
  "go vet ./...",
  "make check",
  "make test",
  "./scripts/ai-check.sh",
]

# Commands requiring approval
require_approval = [
  "git push",
  "git reset",
  "rm -rf",
  "docker",
  "kubectl",
  "psql",
  "make deploy",
]

[history]
persistence = "project"  # save history in .codex/

[mcp]
# MCP servers (sync with mcp/config.json)
