# Model registry for local LLM stack
# Used by download-*.sh and switch-model.sh scripts

models:
  # --- EXL2 (TabbyAPI / ExLlamaV2) ---
  coder-7b:
    repo: bartowski/Qwen2.5-Coder-7B-Instruct-exl2
    branch: 6_5
    format: exl2
    purpose: Main coder (generation, refactoring, tests)
    vram_4k:  "7.2 GB"
    vram_16k: "8.6 GB"
    vram_32k: "10.6 GB"
    recommended: true

  writer-14b:
    repo: bartowski/Qwen2.5-14B-Instruct-exl2
    branch: 4_25
    format: exl2
    purpose: Specs, architecture, docs, RFC, plans
    vram_4k:  "10.1 GB"
    vram_16k: "13.0 GB"
    note: "On edge of 12 GB VRAM — keep ctx <= 8192"
    recommended: true

  coder-14b-universal:
    repo: bartowski/Qwen2.5-Coder-14B-Instruct-exl2
    branch: 4_25
    format: exl2
    purpose: Universal alternative (code + text)
    vram_4k:  "10.1 GB"
    vram_16k: "13.0 GB"
    note: "Slower than 7B coder, but handles everything"

  llama-8b-fast:
    repo: bartowski/Meta-Llama-3.1-8B-Instruct-exl2
    branch: 6_5
    format: exl2
    purpose: Fast fallback, drafts, explanations
    vram_4k: "~8 GB"

  coder-32b-heavy:
    repo: bartowski/Qwen2.5-Coder-32B-Instruct-exl2
    branch: 4_0
    format: exl2
    purpose: Complex refactoring, architectural analysis
    note: "Does not fit in 12 GB VRAM — use AirLLM"

  # --- GGUF (llama.cpp) ---
  coder-7b-gguf:
    repo: Qwen/Qwen2.5-Coder-7B-Instruct-GGUF
    file_q5: Qwen2.5-Coder-7B-Instruct-Q5_K_M.gguf
    file_q4: Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf
    format: gguf
    size_q5: "5.44 GB"
    size_q4: "4.68 GB"
    purpose: Coder (fallback llama.cpp stack)

  writer-14b-gguf:
    repo: Qwen/Qwen2.5-14B-Instruct-GGUF
    file_q5: Qwen2.5-14B-Instruct-Q5_K_M.gguf
    file_q4: Qwen2.5-14B-Instruct-Q4_K_M.gguf
    format: gguf
    size_q5: "10.5 GB"
    size_q4: "8.99 GB"
    purpose: Text / docs (fallback llama.cpp stack)

  # --- AirLLM (heavy models, layer-wise) ---
  coder-32b-airllm:
    repo: Qwen/Qwen2.5-Coder-32B-Instruct
    format: airllm
    compression: 4bit
    ctx: 8192
    purpose: Heavy coder when VRAM is insufficient
