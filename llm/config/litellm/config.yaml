# LiteLLM Proxy configuration
# Use if you need a single router: local model + cloud
# Documentation: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # Local coder (TabbyAPI / ExLlamaV2)
  - model_name: local-coder
    litellm_params:
      model: openai/Qwen2.5-Coder-7B-Instruct-exl2
      api_base: http://tabbyapi:5000/v1
      api_key: "none"

  # Local writer (TabbyAPI / ExLlamaV2)
  - model_name: local-writer
    litellm_params:
      model: openai/Qwen2.5-14B-Instruct-exl2
      api_base: http://tabbyapi:5000/v1
      api_key: "none"

  # Local llama.cpp (fallback)
  - model_name: local-llamacpp
    litellm_params:
      model: openai/Qwen2.5-Coder-7B-Instruct-Q5_K_M
      api_base: http://llamacpp:8080/v1
      api_key: "none"

  # Cloud — OpenAI GPT-4o (complex tasks)
  - model_name: cloud-strong
    litellm_params:
      model: gpt-4o
      api_key: "os.environ/OPENAI_API_KEY"

  # Cloud — Anthropic Claude (alternative)
  - model_name: cloud-claude
    litellm_params:
      model: claude-sonnet-4-6
      api_key: "os.environ/ANTHROPIC_API_KEY"

# Default routing
router_settings:
  # Try local coder first, fallback to cloud on error
  routing_strategy: simple-shuffle
  fallbacks:
    - {"local-coder": ["cloud-strong"]}
    - {"local-writer": ["cloud-claude"]}

# General settings
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"  # set in .env

litellm_settings:
  # Log requests
  set_verbose: false
  # Request timeout for local model
  request_timeout: 120
