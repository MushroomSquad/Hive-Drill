# Аргументы llama.cpp server
# Используется в profiles/llamacpp-router.sh и harbor llamacpp args "..."
# Документация: https://github.com/ggerganov/llama.cpp/tree/master/tools/server

# --- Router mode (несколько моделей) ---
LLAMACPP_ROUTER_ARGS="--models-dir /app/data/models --models-max 2 --no-models-autoload -c 8192 -fa on -ngl all"

# --- Одна модель (прямой запуск) ---
# LLAMACPP_SINGLE_ARGS="-m /app/data/models/Qwen2.5-Coder-7B-Instruct-Q5_K_M.gguf -c 16384 -fa on -ngl all -cb"

# --- Пояснения к флагам ---
# -c 8192         Размер контекста (можно 16384 для 7B Q5_K_M, влезает)
# -fa on          Flash Attention — ускорение и экономия VRAM
# -ngl all        Все слои на GPU (максимальная скорость)
# -cb             Continuous batching (для нескольких запросов)
# --cache-prompt  Переиспользование KV-кэша для одинаковых префиксов (важно для IDE!)
# --models-max 2  Не выгружать предыдущую, если помещаются две модели
# -no-models-autoload  Загружать только по явному запросу

# --- Speculative decoding (опционально) ---
# --model-draft /app/data/models/Qwen2.5-Coder-1.5B-Instruct-Q5_K_M.gguf
# --draft-max 16
# --draft-min 1
