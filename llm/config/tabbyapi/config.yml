# TabbyAPI configuration
# Documentation: https://github.com/theroyallab/tabbyAPI

# Directories
model_dir: /app/data/models
draft_model_dir: /app/data/draft_models

# Default model loading (overridden via harbor tabbyapi model <...>)
# model_name: Qwen2.5-Coder-7B-Instruct-exl2

# Context
# Note: for 12 GB VRAM start with 8192, can increase to 16384 with 7B coder
max_seq_len: 8192

# GPU
gpu_split_auto: true
# gpu_split: [12]  # GB VRAM — can be set explicitly

# Generation
max_batch_size: 1  # single user
stream_interval: 1

# Cache (speeds up repeated system prompts / long contexts)
cache_size: 4096
cache_mode: Q4   # Q4 cache — saves VRAM

# Speculative decoding (optional — requires draft model)
# draft_model_name: Qwen2.5-Coder-1.5B-Instruct-exl2
# speculative_ngram: false

# API
host: 0.0.0.0
port: 5000
disable_auth: true  # internal use, do not expose externally without auth

# Logging
log_level: info
log_prompt: false
log_generation_params: false
